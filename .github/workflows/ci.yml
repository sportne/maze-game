name: CI

on:
  pull_request:
  push:

jobs:
  build:
    name: Quality gate and native image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          cache: gradle

      - name: Fetch PMD submodule tags
        run: git -C tools/pmd fetch --tags --force origin

      - name: Run quality gate and native image build
        run: ./gradlew qualityGate nativeImage
